<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Search AudioJAKH</title>
  <link rel="stylesheet" th:href="@{/main.css}">
</head>
<body>
<h1>🔍 Find Music via Spotify</h1>

<form th:action="@{/search}" method="get">
  <input type="text" name="query" th:value="${query}" placeholder="Search for songs, artists..." required>
  <button type="submit">Search</button>
</form>

<div th:if="${results != null}">
  <h2>Results for "<span th:text="${query}"></span>"</h2>
  <ul>
    <li th:each="track : ${results}">
      <!-- Clicking this takes them to your song controller which saves it if it's new -->
      <a th:href="@{/songs/{id}(id=${track.spotifyId})}" th:text="${track.title}">Track Name</a>
    </li>
  </ul>
</div>
</body>
</html>
