<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">

	<body>

		<!-- Shared top nav -->
		<nav class="navbar" th:fragment="navbar">

			<!-- Logo / home link. Text placeholder. -->
			<a th:href="@{/}"> <img class="logo" th:src="@{/images/audioJAKH_logo.gif}" alt="audioJACK logo"/></a>

			<ul class="navbar-links">
				<li><a th:href="@{/}">Home</a></li>
				<li><a th:href="@{/songs}">Songs</a></li>
				<li><a th:href="@{/members}">Members</a></li>
			</ul>

			<!-- Member search. -->
			<form class="navbar-search" th:action="@{/search}" method="get">
				<input type="text" name="query" minlength="3"
				       placeholder="Search for members…" required/>
				<button class="search-btn" type="submit" aria-label="Search">
					<svg xmlns="http://w3.org" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
						<path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
					</svg>
				</button>
			</form>

			<!-- Profile icon + hover dropdown -->
			<div class="user-menu">
				<!-- Avatar placeholder  -->
				<span class="user-img" aria-hidden="true"></span>

				<div class="sub-menu-wrap" id="subMenu">
					<div class="sub-menu">
						<div class="user-info">
							<span class="user-img" aria-hidden="true"></span>
							<p sec:authentication="principal.attributes['email']">user@email.com</p>
						</div>
						<hr/>
						<a th:href="@{/profile/{username}(username=${currentUsername})}" class="sub-menu-link">
							<img th:src="@{/images/circle-user.svg}" alt="edit profile icon">
							<p>Profile</p>
							<span>></span>
						</a>
						<a th:href="@{/logout}" class="sub-menu-link" id="sign-out">
							<img th:src="@{/images/exit.svg}" alt="exit icon" style="transform: scaleX(-1);">
							<p>Logout</p>
							<span>></span>
						</a>
					</div>
				</div>
			</div>

		</nav>

	</body>
</html>
