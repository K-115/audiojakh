<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">

    <head th:replace="~{head :: head('AudioJAKH - Discover Music')}"></head>

	<body class="bg-canvas">

		<div th:replace="~{navbar :: navbar}"></div>

			<main>
				<h1>AudioJAKH Members</h1>

				<p>Find other music lovers to follow and explore their reviews.</p>

				<div class="members-grid">
					<ul>

						<li th:each="member : ${members}" class="member-card">

							<img th:if="${member.profilePicture != null}" th:src="${member.profilePicture}"/>
							<img th:unless="${member.profilePicture != null}" th:src="@{/images/default-avatar.png}"/>

							<div class="member-info">

								<a th:href="@{/profile/{username}(username=${member.username})}"
								   th:text="${member.username}"
								   class="member-link">Username</a>


								<span th:if="${currentUser != null && currentUser.id == member.id}"
								      class="badge-me">(You)</span>
							</div>

						</li>

					</ul>
				</div>
			</main>
		</div>

		<div th:replace="~{footer :: footer}"></div>

	</body>
</html>
