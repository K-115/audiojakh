<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{head :: head('Members — AudioJAKH')}"></head>

<body class="bg-canvas">
<div th:replace="~{navbar :: navbar}"></div>

<main class="max-w-[980px] mx-auto px-10 pb-24 box-border">

    <header class="mt-12 mb-8">
        <p class="eyebrow mb-2" style="margin-top: 5rem;">The community</p>
        <h1 class="text-4xl m-0 mb-2">AudioJAKH Members</h1>
        <p class="text-cream-400 m-0">Find other music lovers to follow and explore their reviews.</p>
    </header>

    <ul class="list-none m-0 p-0 grid grid-cols-[repeat(auto-fill,minmax(220px,1fr))] gap-4">
        <li th:each="member : ${members}" class="brand-card flex items-center gap-4 p-4 box-border">
            <img th:if="${member.profilePicture != null}" th:src="@{'/images/' + ${member.profilePicture}}" alt=""
                 class="w-12 h-12 rounded-full object-cover border border-hairline shrink-0"/>
            <img th:unless="${member.profilePicture != null}" th:src="@{/images/default-avatar.png}" alt=""
                 class="w-12 h-12 rounded-full object-cover border border-hairline shrink-0"/>
            <div class="min-w-0">
                <a th:href="@{/profile/{username}(username=${member.username})}"
                   th:text="${member.username}"
                   class="block truncate font-semibold text-cream-200 no-underline hover:text-red-300">Username</a>
                <span th:if="${currentUser != null && currentUser.id == member.id}" class="chip mt-1">You</span>
            </div>
        </li>
    </ul>

</main>

<div th:replace="~{footer :: footer}"></div>
</body>
</html>
