<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head lang="en">
    <meta charset="UTF-8"/>
    <title th:text="${album.name} + ' - AudioJAKH'">Album - AudioJAKH</title>
    <link rel="stylesheet" href="/main.css" />
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>
    <img th:src="${album.images != null && album.images.length > 0} ? ${album.images[0].url} : '/images/default-album.png'"/>
    <div>
        <h1 th:text="${album.name}">Album Name</h1>
        <p th:text="${album.artists[0].name}">Artist Name</p>
        <p th:text="${album.releaseDate} + ' • ' + ${album.albumType}"></p>
        <div th:if="${currentUser != null}" style="margin-top: 20px;">
            <form th:action="@{/favourites/album}" method="post">
                <input type="hidden" name="id" th:value="${album.id}" />
                <button type="submit" class="search-action-btn" style="background-color: #1DB954;">
                    ⭐ Set as my Favourite Album
                </button>
            </form>
        </div>

    </div>


<h2>Tracklist</h2>
    <li th:each="track, iter : ${tracks}">
        <div>
            <span th:text="${iter.index + 1} + '. '">1.</span>
            <a th:href="@{/songs/{id}(id=${track.id})}" th:text="${track.name}">Song Title</a>
        </div>
        <span
              th:with="totalSecs=${track.durationMs / 1000}, mins=${totalSecs / 60}, secs=${totalSecs % 60}"
              th:text="${mins} + ':' + (${secs < 10} ? '0' + ${secs} : ${secs})">3:45</span>

    </li>
</ul>

<p><a th:href="@{/songs}">&larr; Back to Music Discovery</a></p>
</div>

<div th:replace="~{footer :: footer}"></div>
</body>
</html>
