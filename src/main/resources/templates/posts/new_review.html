<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">

<head th:replace="~{head :: head('AudioJAKH - Discover Music')}"></head>

<body class="bg-canvas">

<div th:replace="~{navbar :: navbar}"></div>

<div class="max-w-[1180px] mx-auto px-10 pb-24 box-border">


    <p><a th:href="@{/reviews}">&larr; Back to Timeline</a></p>
    <h1>Write a New Review</h1>

    <form th:action="@{/reviews/new}" method="get" style="margin-bottom: 30px;">
        <label>Step 1: Search for a track to review</label><br/>
        <input type="text" name="query" th:value="${query}" placeholder="Type a song title..." required>
        <button type="submit">Search</button>
    </form>

    <form th:action="@{/reviews}" th:object="${review}" method="post" th:if="${not #lists.isEmpty(searchTracks)}">

        <label for="trackId">Step 2: Select the correct song</label><br/>
        <select name="trackId" id="trackId" required style="width: 100%; padding: 8px; margin-bottom: 20px;">
            <option th:each="track : ${searchTracks}"
                    th:value="${track.id}"
                    th:data-img="${track.album.images != null && track.album.images.length > 0} ? ${track.album.images[0].url} : '/images/default-album.png'"
                    th:text="${track.name} + ' — By ' + ${track.artists[0].name}">Track option</option>
        </select>

        <div class="cover-preview-wrapper" style="margin-bottom: 20px;">
            <img id="cover-preview" class="cover-preview-image" src="" alt="Album Artwork Preview" style="max-width: 150px; display: none;" />
        </div>

        <div class="star-rating-container" style="margin-bottom: 20px;">
            <label>Step 3: Give it a star rating</label><br/>
            <input type="hidden" th:field="*{rating}" id="rating-input" required />
            <div class="star-group" id="star-group" style="font-size: 2rem; cursor: pointer;">
                <span class="star-item" data-value="1">★</span>
                <span class="star-item" data-value="2">★</span>
                <span class="star-item" data-value="3">★</span>
                <span class="star-item" data-value="4">★</span>
                <span class="star-item" data-value="5">★</span>
            </div>
        </div>

        <label for="body">Step 4: Share your thoughts</label><br/>
        <textarea th:field="*{content}" id="body" placeholder="What do you think of this track?..." style="width: 100%; height: 120px;" required></textarea>

        <br/><br/>
        <button type="submit" class="btn-submit">
            Publish Review
        </button>
    </form>
</div>

<script th:if="${not #lists.isEmpty(searchTracks)}">
    document.addEventListener("DOMContentLoaded", function() {
        const selectElement = document.getElementById("trackId");
        const coverImage = document.getElementById("cover-preview");
        const ambientBg = document.getElementById("ambient-bg");

        function updateVisuals() {
            const selectedOption = selectElement.options[selectElement.selectedIndex];
            if (!selectedOption) return;

            const imageUrl = selectedOption.getAttribute("data-img");

            if (imageUrl) {
                coverImage.src = imageUrl;
                coverImage.style.display = "block";

                if (ambientBg) {
                    ambientBg.style.backgroundImage = "url('" + imageUrl + "')";
                }
            }
        }

        selectElement.addEventListener("change", updateVisuals);
        updateVisuals();

        const starGroup = document.getElementById("star-group");
        if (starGroup) {
            const stars = starGroup.querySelectorAll(".star-item");
            const ratingInput = document.getElementById("rating-input");

            stars.forEach(star => {
                star.addEventListener("click", function() {
                    const selectedValue = this.getAttribute("data-value");
                    ratingInput.value = selectedValue;

                    stars.forEach(s => {
                        if (parseInt(s.getAttribute("data-value")) <= parseInt(selectedValue)) {
                            s.style.color = "#FFD700";
                        } else {
                            s.style.color = "#444444";
                        }
                    });
                });
            });
        }
    });
</script>

<div th:replace="~{footer :: footer}"></div>

</body>
</html>
