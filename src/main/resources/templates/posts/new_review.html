<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{head :: head('AudioJAKH - Write a Review')}"></head>

<body class="bg-canvas text-white">

<div th:replace="~{navbar :: navbar}"></div>

<div id="dynamic-hero-banner" class="w-full h-[35vh] relative overflow-hidden bg-ink-950 border-b border-ink-800 transition-all duration-500">
    <div id="ambient-bg" class="absolute inset-0 bg-cover bg-center filter blur-xl scale-110 opacity-30 transition-all duration-700"></div>

    <div class="absolute inset-0 bg-gradient-to-t from-canvas via-canvas/40 to-transparent"></div>

    <div class="max-w-[1180px] mx-auto h-full px-10 flex flex-col justify-end pb-8 relative z-10 box-border">
        <p class="m-0"><a th:href="@{/reviews}" class="text-cream-400 no-underline hover:text-white text-sm transition-colors">&larr; Back to Timeline</a></p>        <h1 class="text-4xl md:text-5xl font-extrabold leading-[1.04] mt-2 mb-0">Write a New Review</h1>
    </div>
</div>

<div class="max-w-[1180px] mx-auto px-10 pt-10 pb-24 box-border">

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-start">

        <div class="md:col-span-2 flex flex-col gap-8">

            <div class="brand-card p-5 bg-ink-900 border border-ink-800 rounded-xl shadow-sm">
                <form th:action="@{/reviews/new}" method="get" class="m-0 flex flex-col gap-3">
                    <label class="font-semibold text-cream-200 text-sm">Step 1: Search for a track to review</label>
                    <div class="flex gap-3">
                        <input type="text" name="query" th:value="${query}" placeholder="Type a song title..." required
                               class="bg-ink-950 text-white placeholder-cream-600 border border-ink-800 px-4 py-2.5 rounded-lg outline-none focus:border-red-500 transition-colors flex-grow text-sm" />
                        <button type="submit" class="bg-red-500 hover:bg-red-400 text-white font-bold px-6 py-2.5 rounded-lg border-none shadow-md cursor-pointer transition-colors text-sm">
                            Search
                        </button>
                    </div>
                </form>
            </div>

            <form th:action="@{/reviews}" th:object="${review}" method="post" th:if="${not #lists.isEmpty(searchTracks)}"
                  class="brand-card p-6 bg-ink-900 border border-ink-800 rounded-xl shadow-sm flex flex-col gap-6">

                <div class="flex flex-col gap-2">
                    <label for="trackId" class="font-semibold text-cream-200 text-sm">Step 2: Select the correct song</label>
                    <select name="trackId" id="trackId" required
                            class="bg-ink-950 text-cream-100 border border-ink-800 px-4 py-3 rounded-lg outline-none cursor-pointer focus:border-red-500 transition-colors text-sm w-full">
                        <option th:each="track : ${searchTracks}"
                                th:value="${track.id}"
                                th:data-img="${track.album != null && track.album.images != null && track.album.images.length > 0} ? ${track.album.images[0].url} : 'https://spotify.com'"
                                th:text="${track.name} + ' — By ' + ${track.artists[0].name}">Track option</option>
                    </select>
                </div>

                <div class="star-rating-container flex flex-col gap-1.5">
                    <label class="font-semibold text-cream-200 text-sm">Step 3: Give it a star rating</label>
                    <input type="hidden" th:field="*{rating}" id="rating-input" required value="" />
                    <div class="star-group flex gap-1 font-sans text-ink-700" id="star-group" style="font-size: 2.5rem; cursor: pointer; width: max-content;">
                        <span class="star-item transition-colors duration-150" data-value="1">★</span>
                        <span class="star-item transition-colors duration-150" data-value="2">★</span>
                        <span class="star-item transition-colors duration-150" data-value="3">★</span>
                        <span class="star-item transition-colors duration-150" data-value="4">★</span>
                        <span class="star-item transition-colors duration-150" data-value="5">★</span>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <label for="body" class="font-semibold text-cream-200 text-sm">Step 4: Share your thoughts</label>
                    <textarea th:field="*{content}" id="body" placeholder="What do you think of this track?..." required
                              class="bg-ink-950 text-white placeholder-cream-600 border border-ink-800 px-4 py-3 rounded-lg outline-none focus:border-red-500 transition-colors w-130 h-32 resize-y leading-relaxed text-sm"></textarea>
                </div>

                <div class="pt-2">
                    <button type="submit" class="bg-red-500 hover:bg-red-400 text-white font-bold px-8 py-3 rounded-full border-none shadow-md cursor-pointer transition-colors text-sm">
                        Publish Review
                    </button>
                </div>
            </form>
        </div>

        <div class="md:col-span-1" th:if="${not #lists.isEmpty(searchTracks)}">
            <div class="brand-card p-5 bg-ink-900 border border-ink-800 rounded-xl shadow-sm text-center flex flex-col items-center sticky top-6">
                <span class="eyebrow uppercase tracking-widest text-[10px] font-bold text-cream-500 mb-4 block">Artwork Selection</span>
                <div class="cover-preview-wrapper w-full max-w-[220px] aspect-square rounded-lg overflow-hidden shadow-2xl bg-ink-950 border border-ink-800 mb-2">
                    <img id="cover-preview" class="w-full h-full object-cover transition-all duration-500" src="" alt="Album Artwork Preview" style="display: none;" />
                </div>
            </div>
        </div>

    </div>
</div>

<script th:if="${not #lists.isEmpty(searchTracks)}">
    document.addEventListener("DOMContentLoaded", function() {
        const selectElement = document.getElementById("trackId");
        const coverImage = document.getElementById("cover-preview");
        const ambientBg = document.getElementById("ambient-bg");

        function updateVisuals() {
            const selectedOption = selectElement.options[selectElement.selectedIndex];
            if (!selectedOption) return;

            const imageUrl = selectedOption.getAttribute("data-img");

            if (imageUrl) {
                coverImage.src = imageUrl;
                coverImage.style.display = "block";

                if (ambientBg) {
                    ambientBg.style.backgroundImage = "url('" + imageUrl + "')";
                }
            }
        }

        selectElement.addEventListener("change", updateVisuals);
        updateVisuals();

        const starGroup = document.getElementById("star-group");
        if (starGroup) {
            const stars = starGroup.querySelectorAll(".star-item");
            const ratingInput = document.getElementById("rating-input");

            stars.forEach(s => s.style.color = "#444444");

            stars.forEach(star => {
                star.addEventListener("click", function() {
                    const selectedValue = this.getAttribute("data-value");
                    ratingInput.value = selectedValue;

                    stars.forEach(s => {
                        if (parseInt(s.getAttribute("data-value")) <= parseInt(selectedValue)) {
                            s.style.color = "#FFD700";
                        } else {
                            s.style.color = "#444444";
                        }
                    });
                });
            });
        }
    });
</script>

<div th:replace="~{footer :: footer}"></div>

</body>
</html>
