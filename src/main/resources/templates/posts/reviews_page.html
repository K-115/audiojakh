<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5" >
<head lang="en">
  <meta charset="UTF-8"/>
  <title>AudioJAKH</title>
  <link rel="stylesheet" href="/main.css" />
</head>
<body>

<div th:replace="~{navbar :: navbar}"></div>

<h1>Reviews</h1>

<div sec:authorize="isAuthenticated()" id="greeting">
  Signed in as <span sec:authentication="principal.attributes['email']"></span>
</div>

<div th:if="${errorMessage}">
  <p th:text="${errorMessage}"></p>
</div>

<form method="get" action="/reviews">
  <p>
    1. Select an Album to Review:
    <select name="albumId" onchange="this.form.submit()">
      <option value="">-- Choose an Album --</option>
      <option th:each="album : ${allAlbums}"
              th:value="${album.spotifyId}"
              th:text="${album.name}"
              th:selected="${album.spotifyId == selectedAlbumId}"></option>
    </select>
    <button type="submit" th:if="${selectedAlbumId == null}">Next Step</button>
  </p>
</form>

<form th:if="${selectedAlbumId != null}" th:action="@{/reviews}" th:object="${review}" method="post">
  <input type="hidden" th:value="${selectedAlbumId}" name="albumId" id="albumId" />

  <p>Content: <input type="text" th:field="*{content}" required /></p>

  <p>
    Rating:
    <select th:field="*{rating}" required>
      <option value="" disabled selected>Select stars</option>
      <option value="1">⭐ (1)</option>
      <option value="2">⭐⭐ (2)</option>
      <option value="3">⭐⭐⭐ (3)</option>
      <option value="4">⭐⭐⭐⭐ (4)</option>
      <option value="5">⭐⭐⭐⭐⭐ (5)</option>
    </select>
  </p>

  <p>
    2. Choose a Song from this Album (Optional):
    <select name="trackId">
      <option value="">-- None (Reviewing the entire album) --</option>
      <option th:each="track : ${allTracks}"
              th:value="${track.spotifyId}"
              th:text="${track.name}"></option>
    </select>
  </p>

  <p>
    <input type="submit" value="Submit Review" />
  </p>
</form>

<form method="get" action="/reviews" style="display: inline;">
  <button type="submit">Reset / Change Album</button>
</form>

<!--add profile pic and username-->
<ul>
  <li th:each="review: ${reviews}">

    <div>
      <a th:if="${review.user != null}" th:href="@{/profile/{username}(username=${review.user.username})}">
      <img th:if="${review.user != null && review.user.profilePicture != null}"
           th:src="${review.user.profilePicture}"
      </a>

      <img th:if="${review.user == null || review.user.profilePicture == null}"
           src="images/default-avatar.png"
           alt="Default Avatar"/>
    </div>

<!-- ______________________-->

    <div>
      <div>
        <span th:if="${review.user != null}">
          <a th:href="@{/profile/{username}(username=${review.user.username})}">
            <strong th:text="${review.user.username}"></strong>
          </a>
        </span>

      <p th:text="${review.content}"></p>

      <div>
        <span th:if="${review.track != null}" th:text="'🎵 Song: ' + ${review.track.name}"></span>
        <span th:if="${review.track == null && review.album != null}" th:text="'💿 Album: ' + ${review.album.name}"></span>
      </div>
    </div>

  </li>
</ul>

<div th:replace="~{footer :: footer}"></div>

</body>
</html>
