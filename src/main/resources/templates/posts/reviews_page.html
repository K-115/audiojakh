<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5" >
<head lang="en">
  <meta charset="UTF-8"/>
  <title>AudioJAKH</title>
  <link rel="stylesheet" href="/main.css" />
</head>
<body>

<div th:replace="~{navbar :: navbar}"></div>

<h1>Reviews</h1>

<div sec:authorize="isAuthenticated()" id="greeting">
  Signed in as <span sec:authentication="principal.attributes['email']"></span>
</div>

<div th:if="${errorMessage}" style="color: red; background-color: #ffe6e6; padding: 10px; border: 1px solid red; margin-bottom: 15px;">
  <p th:text="${errorMessage}"></p>
</div>

<form method="get" action="/reviews">
  <p>
    1. Select an Album to Review:
    <select name="albumId" onchange="this.form.submit()">
      <option value="">-- Choose an Album --</option>
      <option th:each="album : ${allAlbums}"
              th:value="${album.spotifyId}"
              th:text="${album.name}"
              th:selected="${album.spotifyId == selectedAlbumId}"></option>
    </select>
    <button type="submit" th:if="${selectedAlbumId == null}">Next Step</button>
  </p>
</form>

<form th:if="${selectedAlbumId != null}" th:action="@{/reviews}" th:object="${review}" method="post">
  <input type="hidden" name="albumId" th:value="${selectedAlbumId}" />

  <p>Content: <input type="text" th:field="*{content}" required /></p>

  <p>
    Rating:
    <select th:field="*{rating}" required>
      <option value="" disabled selected>Select stars</option>
      <option value="1">⭐ (1)</option>
      <option value="2">⭐⭐ (2)</option>
      <option value="3">⭐⭐⭐ (3)</option>
      <option value="4">⭐⭐⭐⭐ (4)</option>
      <option value="5">⭐⭐⭐⭐⭐ (5)</option>
    </select>
  </p>

  <p>
    2. Choose a Song from this Album (Optional):
    <select name="trackId">
      <option value="">-- None (Reviewing the entire album) --</option>
      <option th:each="track : ${allTracks}"
              th:value="${track.spotifyId}"
              th:text="${track.name}"></option>
    </select>
  </p>

  <p>
    <input type="submit" value="Submit Review" />
  </p>
</form>

<form method="get" action="/reviews" style="display: inline;">
  <button type="submit">Reset / Change Album</button>
</form>


<ul>
  <li th:each="review: ${reviews}">
    <strong th:text="${review.content}"></strong>
    <span th:if="${review.rating != null}" th:text="' (' + ${review.rating} + '★)'"></span>

    <span th:if="${review.track != null}">
      <small th:text="' - Song: ' + ${review.track.name}"></small>
    </span>

    <span th:if="${review.album != null}">
      <small th:text="' - Album: ' + ${review.album.name}"></small>
    </span>
  <li th:each="comment : ${review.comments}" style="padding: 5px 0; border-bottom: 1px dashed #eee; font-size: 0.95em;">
    <!-- Displays comment poster details if linked, or plain content -->
    <span th:text="${comment.content}">Comment text</span>
    <small style="color: #999; display: block;" th:text="${#temporals.format(comment.dateOfComment, 'dd MMM yyyy HH:mm')}">Date</small>
  </li>
  <div sec:authorize="isAuthenticated()" style="margin-top: 10px;">
    <form th:action="@{/comments}" method="post" style="display: flex; gap: 10px;">
      <input type="hidden" name="reviewId" th:value="${review.id}" />
      <input type="text" name="content" placeholder="Write a comment..." required
             style="flex-grow: 1; padding: 5px; border: 1px solid #ccc; border-radius: 4px;" />
      <button type="submit" style="padding: 5px 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
        Reply
      </button>
    </form>
  </div>

</ul>

<div th:replace="~{footer :: footer}"></div>

</body>
</html>
