<!--add profile pic and username-->

        <a th:href="@{/reviews/new}" class="btn" style="padding: 10px 20px; background-color: #1DB954; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">
            + Write a Review
        </a>
    </div>

        <div class="sort-controls">
            <span>Sort by:</span>

            <a th:href="@{/reviews(sort='recent')}"
               th:style="${currentSort == 'recent'} ? 'color: #1DB954; font-weight: bold; text-decoration: underline;' : 'color: #b3b3b3; text-decoration: none; margin-right: 10px;'"
               style="margin-right: 15px;">Most Recent</a>

            <a th:href="@{/reviews(sort='liked')}"
               th:style="${currentSort == 'liked'} ? 'color: #1DB954; font-weight: bold; text-decoration: underline;' : 'color: #b3b3b3; text-decoration: none;'">Most Liked</a>
        </div>
    </div>
<ul>
    <li th:each="rv : ${reviewViews}">

        <div>
            <a th:if="${rv.review.user != null}"
               th:href="@{/profile/{username}(username=${rv.review.user.username})}">
                <img th:if="${rv.review.user.profilePicture != null}"
                     th:src="@{'/images/' + ${rv.review.user.profilePicture}}" alt="Avatar"/>
            </a>
            <img th:if="${rv.review.user == null or rv.review.user.profilePicture == null}"
                 th:src="@{/images/default-avatar.png}" alt="Default Avatar"/>
        </div>

        <div>
      <span th:if="${rv.review.user != null}">
        <a th:href="@{/profile/{username}(username=${rv.review.user.username})}">
          <strong th:text="${rv.review.user.username}"></strong>
        </a>
      </span>

            <p th:text="${rv.review.content}"></p>

            <div>
                <span th:if="${rv.review.track != null}" th:text="'🎵 Song: ' + ${rv.review.track.name}"></span>
                <span th:if="${rv.review.track == null and rv.review.album != null}" th:text="'💿 Album: ' + ${rv.review.album.name}"></span>
            </div>
            <span th:if="${rv.review.rating != null}" th:text="' (' + ${rv.review.rating} + '★)'">

            </span>

            <span class="review-actions">
        <form th:action="@{/reviews/{id}/like(id=${rv.review.id})}" method="post" style="display:inline">
          <button type="submit" class="heart-btn" th:text="${rv.likedByMe} ? '❤️' : '🤍'"></button>
        </form>
        <span class="like-count" th:text="${rv.likeCount}"></span> likes
      </span>
        </div>


  <div sec:authorize="isAuthenticated()" style="margin-top: 10px;">
    <form th:action="@{/comments}" method="post" style="display: flex; gap: 10px;">
      <input type="hidden" name="reviewId" th:value="${rv.review.id}" />
      <input type="text" name="content" placeholder="Write a comment..." required/>
      <button type="submit">
        Reply
      </button>
    </form>
  </div>
    </li>

</ul>

<div th:replace="~{footer :: footer}"></div>
