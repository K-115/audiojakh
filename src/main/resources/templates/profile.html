<!-- User's Reviews -->
<h3>My Reviews</h3>
<ul>
  <li th:each="review : ${reviews}">
    <p th:text="${review.content}">Review content</p>
  </li>
</ul>

<!-- Favourites Sections -->
<h3>Favourite Albums</h3>
<ul>
  <li th:each="album : ${favouriteAlbums}" th:text="${album.title}">Album Title</li>
</ul>

<h3>Favourite Songs</h3>
<ul>
  <li th:each="song : ${favouriteSongs}" th:text="${song.title}">Song Title</li>
</ul>

<h3>Favourite Artists</h3>
<ul>
  <li th:each="artist : ${favouriteArtists}" th:text="${artist.name}">Artist Name</li>
</ul>
