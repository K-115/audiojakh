<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head th:replace="~{head :: head('AudioJAKH - Discover Music')}"></head>
<body class="bg-canvas text-white">

<div th:replace="~{navbar :: navbar}"></div>

<div class="max-w-[1180px] mx-auto px-10 pb-24 box-border">

    <h1 class="text-5xl font-bold leading-[1.04] mt-8 mb-8">Discover Music</h1>

    <form th:action="@{/songs}" method="get" class="brand-card p-4 flex flex-wrap gap-4 items-center mb-12">

        <input type="text" name="query" th:value="${query}" placeholder="Search..."
               class="bg-ink-900 text-white placeholder-cream-500 border border-ink-700 px-4 py-2 rounded-md outline-none focus:border-red-400 transition-colors flex-grow min-w-[200px]" />


        <select name="year" class="bg-ink-900 text-cream-200 border border-ink-700 px-4 py-2 rounded-md outline-none cursor-pointer hover:border-ink-500 transition-colors min-w-[150px]">
            <option value="">Filter by Year</option>
            <option th:each="y : ${#numbers.sequence(2026, 1970, -1)}"
                    th:value="${y}" th:text="${y}"
                    th:selected="${y == #strings.toString(selectedYear)}">Year</option>
        </select>

        <select name="genre" class="bg-ink-900 text-cream-200 border border-ink-700 px-4 py-2 rounded-md outline-none cursor-pointer hover:border-ink-500 transition-colors min-w-[150px]">
            <option value="">Filter by Genre</option>
            <option value="pop" th:selected="${selectedGenre == 'pop'}">Pop</option>
            <option value="rock" th:selected="${selectedGenre == 'rock'}">Rock</option>
            <option value="hip-hop" th:selected="${selectedGenre == 'hip-hop'}">Hip-Hop</option>
            <option value="jazz" th:selected="${selectedGenre == 'jazz'}">Jazz</option>
            <option value="electronic" th:selected="${selectedGenre == 'electronic'}">Electronic</option>
        </select>

        <select name="orderBy" class="bg-ink-900 text-cream-200 border border-ink-700 px-4 py-2 rounded-md outline-none cursor-pointer hover:border-ink-500 transition-colors min-w-[150px]">
            <option value="">Order By</option>
            <option value="name" th:selected="${selectedOrderBy == 'name'}">Track Name (A-Z)</option>
            <option value="duration" th:selected="${selectedOrderBy == 'duration'}">Longest Duration</option>
        </select>


        <button type="submit" class="bg-red-500 hover:bg-red-400 text-white px-5 py-2 font-bold rounded-md cursor-pointer transition-colors shadow-sm">
            Apply Filters
        </button>
        <a th:href="@{/songs}" class="text-cream-400 hover:text-white no-underline font-medium ml-2 transition-colors">
            Clear
        </a>
    </form>

    <section class="mb-14" th:if="${(query != null && !query.isEmpty()) || (selectedYear != null && !selectedYear.isEmpty()) || (selectedGenre != null && !selectedGenre.isEmpty())}">
        <h2 class="text-2xl font-semibold mb-4 text-cream-100">Filtered Results</h2>

        <div th:if="${#lists.isEmpty(tracks)}" class="brand-card p-6 text-cream-400 italic">
            <p class="m-0">No tracks matched your specific criteria combinations on Spotify right now.</p>
        </div>

        <div th:unless="${#lists.isEmpty(tracks)}" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <article th:each="track : ${tracks}" class="brand-card p-4 flex flex-col text-center hover:bg-ink-800 transition-colors duration-200 group">
                <img th:src="${track.album != null && track.album.images != null && track.album.images.length > 0} ? ${track.album.images[0].url} : '/images/default-album.png'"
                     alt="Art" class="w-full aspect-square object-cover rounded-md shadow-md mb-3 group-hover:scale-[1.02] transition-transform duration-200" />
                <h4 class="m-0 text-sm font-bold truncate">
                    <a th:href="@{/songs/{id}(id=${track.id})}" th:text="${track.name}" class="text-cream-100 no-underline hover:text-red-400">Title</a>
                </h4>
                <p th:text="${track.artists != null && track.artists.length > 0} ? ${track.artists[0].name} : 'Unknown Artist'"
                   class="text-cream-400 text-xs mt-1 truncate">Artist</p>
            </article>
        </div>
    </section>

    <section class="mb-14">
        <h2 class="text-2xl font-semibold mb-4 text-cream-100">Popular This Week</h2>

        <div th:if="${#lists.isEmpty(popularSongs)}" class="brand-card p-6 text-cream-400 italic">
            <p class="m-0">Unable to load live popular charts right now.</p>
        </div>

        <div th:unless="${#lists.isEmpty(popularSongs)}" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <article th:each="track : ${popularSongs}" class="brand-card p-4 flex flex-col text-center hover:bg-ink-800 transition-colors duration-200 group">
                <img th:src="${track.album != null && track.album.images != null && track.album.images.length > 0} ? ${track.album.images[0].url} : '/images/default-album.png'"
                     alt="Art" class="w-full aspect-square object-cover rounded-md shadow-md mb-3 group-hover:scale-[1.02] transition-transform duration-200" />
                <h4 class="m-0 text-sm font-bold truncate">
                    <a th:href="@{/songs/{id}(id=${track.id})}" th:text="${track.name}" class="text-cream-100 no-underline hover:text-red-400">Title</a>
                </h4>
                <p th:text="${track.artists != null && track.artists.length > 0} ? ${track.artists[0].name} : 'Unknown Artist'"
                   class="text-cream-400 text-xs mt-1 truncate">Artist</p>
            </article>
        </div>
    </section>

    <section class="mb-14">
        <h2 class="text-2xl font-semibold mb-4 text-cream-100">Hot New Releases</h2>

        <div th:if="${#lists.isEmpty(hotReleases)}" class="brand-card p-6 text-cream-400 italic">
            <p class="m-0">Unable to load trending albums right now.</p>
        </div>

        <div th:unless="${#lists.isEmpty(hotReleases)}" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <article th:each="album : ${hotReleases}" class="brand-card p-4 flex flex-col text-center hover:bg-ink-800 transition-colors duration-200 group">
                <img th:src="${album.images != null && album.images.length > 0} ? ${album.images[0].url} : '/images/default-album.png'"
                     alt="Art" class="w-full aspect-square object-cover rounded-md shadow-md mb-3 group-hover:scale-[1.02] transition-transform duration-200" />
                <h4 class="m-0 text-sm font-bold truncate">
                    <a th:href="@{/albums/{id}(id=${album.id})}" th:text="${album.name}" class="text-cream-100 no-underline hover:text-red-400">Album Name</a>
                </h4>
                <p th:text="${album.artists != null && album.artists.length > 0} ? ${album.artists[0].name} : 'Unknown Artist'"
                   class="text-cream-400 text-xs mt-1 truncate">Artist</p>
            </article>
        </div>
    </section>

</div>

<div th:replace="~{footer :: footer}"></div>
</body>
</html>
