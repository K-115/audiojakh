<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head th:replace="~{head :: head('AudioJAKH - Discover Music')}"></head>
<body class="bg-canvas">
<div th:replace="~{navbar :: navbar}"></div>

<h1>Discover Music</h1>

<form th:action="@{/songs}" method="get" class="filter-flex-bar">
    <input type="text" name="query" th:value="${query}" placeholder="Search track name..." />

    <select name="year">
        <option value="">Filter by Year</option>
        <option th:each="y : ${#numbers.sequence(2026, 1970, -1)}"
                th:value="${y}" th:text="${y}"
                th:selected="${y == #strings.toString(selectedYear)}">Year</option>
    </select>

    <select name="genre">
        <option value="">Filter by Genre</option>
        <option value="pop" th:selected="${selectedGenre == 'pop'}">Pop</option>
        <option value="rock" th:selected="${selectedGenre == 'rock'}">Rock</option>
        <option value="hip-hop" th:selected="${selectedGenre == 'hip-hop'}">Hip-Hop</option>
        <option value="jazz" th:selected="${selectedGenre == 'jazz'}">Jazz</option>
        <option value="electronic" th:selected="${selectedGenre == 'electronic'}">Electronic</option>
    </select>

    <select name="orderBy">
        <option value="">Order By</option>
        <option value="name" th:selected="${selectedOrderBy == 'name'}">Track Name (A-Z)</option>
        <option value="duration" th:selected="${selectedOrderBy == 'duration'}">Longest Duration</option>
    </select>

    <button type="submit">Apply Filters</button>
    <a th:href="@{/songs}">Clear</a>
</form>

<div class="songs-dashboard-section" th:if="${(query != null && !query.isEmpty()) || (selectedYear != null && !selectedYear.isEmpty()) || (selectedGenre != null && !selectedGenre.isEmpty())}">
    <h2>Filtered Results</h2>
    <div th:if="${#lists.isEmpty(tracks)}">
        <p>No tracks matched your specific criteria combinations on Spotify right now.</p>
    </div>
    <div th:unless="${#lists.isEmpty(tracks)}" class="songs-grid">
        <div th:each="track : ${tracks}" class="music-item-card">
            <img th:src="${track.album != null && track.album.images != null && track.album.images.length > 0} ? ${track.album.images[0].url} : '/images/default-album.png'" alt="Art" />
            <h4>
                <a th:href="@{/songs/{id}(id=${track.id})}" th:text="${track.name}">Title</a>
            </h4>
            <p th:text="${track.artists != null && track.artists.length > 0} ? ${track.artists[0].name} : 'Unknown Artist'">Artist</p>
        </div>
    </div>
</div>

<div class="songs-dashboard-section">
    <h2>Popular This Week</h2>
    <div class="songs-grid">
        <div th:each="track : ${popularSongs}" class="music-item-card">
            <img th:src="${track.album != null && track.album.images != null && track.album.images.length > 0} ? ${track.album.images[0].url} : '/images/default-album.png'" alt="Art" />
            <h4>
                <a th:href="@{/songs/{id}(id=${track.id})}" th:text="${track.name}">Title</a>
            </h4>
            <p th:text="${track.artists != null && track.artists.length > 0} ? ${track.artists[0].name} : 'Unknown Artist'">Artist</p>
        </div>
    </div>
</div>

<div class="songs-dashboard-section">
    <h2>Hot New Releases</h2>
    <div class="songs-grid">
        <div th:each="album : ${hotReleases}" class="music-item-card">
            <img th:src="${album.images != null && album.images.length > 0} ? ${album.images[0].url} : '/images/default-album.png'" alt="Art" />
            <h4>
                <a th:href="@{/albums/{id}(id=${album.id})}" th:text="${album.name}">Album Name</a>
            </h4>
            <p th:text="${album.artists != null && album.artists.length > 0} ? ${album.artists[0].name} : 'Unknown Artist'">Artist</p>
        </div>
    </div>
</div>

<div th:replace="~{footer :: footer}"></div>
</body>
</html>
